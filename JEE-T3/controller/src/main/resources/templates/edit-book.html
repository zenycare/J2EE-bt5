<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sửa thông tin sách</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-warning text-dark">
                        <h3 class="mb-0 text-center">Cập nhật sách</h3>
                    </div>
                    <div class="card-body">
                        <form action="/books/edit" method="post" th:object="${book}">
                            <input type="hidden" th:field="*{id}" />
                            
                            <div class="mb-3">
                                <label for="title" class="form-label fw-bold">Tiêu đề sách</label>
                                <input type="text" class="form-control" id="title" th:field="*{title}" required />
                            </div>
                            
                            <div class="mb-3">
                                <label for="image" class="form-label fw-bold">Link hình ảnh (URL)</label>
                                <input type="url" class="form-control" id="image" th:field="*{image}" />
                            </div>

                            <div class="mb-3">
                                <label for="price" class="form-label fw-bold">Giá (VNĐ)</label>
                                <input type="number" step="0.01" class="form-control" id="price" th:field="*{price}" required />
                            </div>
                            
                            <div class="mb-3">
                                <label for="author" class="form-label fw-bold">Tác giả</label>
                                <input type="text" class="form-control" id="author" th:field="*{author}" required />
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-warning">Cập nhật thông tin</button>
                                <a href="/books" class="btn btn-secondary">Quay lại</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
